<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Quiz - Software Engineering</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <header>
            <div class="header-content">
                <h1>Metodi e Tecnologie</h1>
                <div class="stats-pills">
                    <span id="counter">Domanda 1/20</span>
                    <span id="score" class="score-pill">Punti: 0</span>
                </div>
            </div>
            <div class="progress-container">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
        </header>

        <!-- Banner modalità allenamento -->
        <div id="training-banner" class="training-banner hidden">
            🔁 Modalità Allenamento — stai ripassando i tuoi errori precedenti
        </div>

        <main id="quiz-card" class="card">
            <div id="question-type" class="type-badge">Risposta Singola</div>
            <h2 id="question-text">Caricamento domande...</h2>
            <div id="options-container" class="options-list"></div>
            <div class="action-area">
                <button id="submit-btn" class="btn primary">Verifica</button>
                <button id="next-btn" class="btn secondary hidden">Continua</button>
            </div>
        </main>

        <div id="result-card" class="card hidden">
            <h2>Quiz Completato!</h2>

            <p id="result-message" class="result-message"></p>

            <div class="results-stats">
                <div class="stat-item">
                    <span class="label">Corrette</span>
                    <span id="correct-count" class="value success-text">0</span>
                </div>
                <div class="stat-item">
                    <span class="label">Errate</span>
                    <span id="wrong-count" class="value error-text">0</span>
                </div>
                <div class="stat-item full-width">
                    <span class="label">Punteggio Finale</span>
                    <span id="final-score" class="value">0</span>
                </div>
            </div>

            <!-- Badge errori persistenti -->
            <div id="persistent-errors-badge" class="persistent-badge hidden"></div>

            <button id="review-btn" class="btn secondary hidden">Rivedi Errori</button>
            <div id="review-list" class="hidden review-section"></div>

            <div class="result-actions">
                <button id="restart-btn" class="btn primary">🔄 Nuovo Quiz</button>
                <button id="training-btn" class="btn training hidden">🔁 Allena gli Errori</button>
                <button id="clear-errors-btn" class="btn danger-outline hidden-on-zero">🗑 Cancella Errori
                    Salvati</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
